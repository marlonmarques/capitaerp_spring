<div class="max-w-[1400px] mx-auto animate-in fade-in duration-500 py-6 px-4">

    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight flex items-center gap-3">
                <i class="pi pi-box text-emerald-600"></i>
                NF-e (Mercadorias)
            </h2>
            <p class="text-slate-500 text-sm font-medium mt-1">
                Configure a numeração, regras fiscais e automações de email para o Modelo 55.
            </p>
        </div>

        <div class="flex gap-2">
            <button mat-flat-button color="primary" [disabled]="isSaving || isLoading || configForm.invalid"
                (click)="salvar()"
                class="!rounded-xl !h-11 !px-6 !font-bold shadow-md shadow-indigo-600/20 w-full sm:w-auto">
                <mat-icon *ngIf="!isSaving">save</mat-icon>
                <span *ngIf="isSaving" class="pi pi-spinner pi-spin mr-2"></span>
                {{ isSaving ? 'Salvando...' : 'Salvar Alterações' }}
            </button>
        </div>
    </div>

    <form *ngIf="configForm && !isLoading" [formGroup]="configForm" class="space-y-6">

        <!-- Seleção de Filial -->
        <div class="card bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden mb-8">
            <div class="px-8 py-5 flex items-center justify-between bg-slate-50/30 border-b border-slate-100">
                <div class="flex items-center gap-4 w-full md:w-1/2">
                    <i class="pi pi-building text-indigo-500 text-xl"></i>
                    <div class="flex-1">
                        <label
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1 block">Filial
                            de Configuração</label>
                        <select formControlName="filialId"
                            class="field-input w-full bg-white border-slate-200 rounded-lg py-2 focus:ring-2 focus:ring-indigo-500/20 transition-all font-semibold">
                            <option [ngValue]="null">-- Selecione a Filial --</option>
                            <option *ngFor="let filial of filiais" [value]="filial.id">
                                {{ filial.nomeFantasia || filial.razaoSocial }}
                            </option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Motor de Emissão -->
        <div class="card bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden mb-8">
            <div class="px-8 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 class="text-sm font-black text-slate-700 flex items-center gap-2 uppercase tracking-widest">
                    <i class="pi pi-cog text-indigo-500"></i>
                    Motor de Emissão
                </h2>

                <!-- Toggle Ativar NF-e -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Ativar Emissão</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" formControlName="ativarNfe" class="sr-only peer">
                        <div
                            class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500">
                        </div>
                    </label>
                </div>
            </div>

            <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
                [class.opacity-50]="!configForm.get('ativarNfe')?.value">

                <div class="md:col-span-2 lg:col-span-3">
                    <h2
                        class="text-xs font-black text-slate-400 flex items-center gap-2 uppercase tracking-widest mb-2 mt-2">
                        <i class="pi pi-briefcase text-amber-500"></i>
                        Padrões de Emissão
                    </h2>
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ambiente Sefaz</label>
                    <select formControlName="ambiente"
                        class="field-input w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5">
                        <option value="HOMOLOGACAO">Homologação (Testes)</option>
                        <option value="PRODUCAO">Produção</option>
                    </select>
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Série Padrão</label>
                    <p-inputNumber formControlName="serie" [useGrouping]="false"
                        inputStyleClass="w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5 font-bold">
                    </p-inputNumber>
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Próxima NF-e</label>
                    <p-inputNumber formControlName="numeroNfe" [useGrouping]="false"
                        inputStyleClass="w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5 font-bold text-blue-600">
                    </p-inputNumber>
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">CFOP Padrão</label>
                    <input type="text" [formControl]="cfopSearchCtrl" [matAutocomplete]="autoCfop"
                        class="field-input w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5"
                        placeholder="Buscar CFOP...">
                    <mat-autocomplete #autoCfop="matAutocomplete" [displayWith]="displayFiscal">
                        <mat-option *ngFor="let c of cfops" [value]="c">{{ c.label }}</mat-option>
                    </mat-autocomplete>
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Natureza Operação</label>
                    <input type="text" formControlName="naturezaOperacaoPadrao"
                        class="field-input w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5"
                        placeholder="Ex: Venda de Mercadoria">
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Categoria Financeira</label>
                    <select formControlName="categoriaId"
                        class="field-input w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5">
                        <option [ngValue]="null">-- Nenhuma --</option>
                        <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nome }}</option>
                    </select>
                </div>

                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Conta para Recebimento</label>
                    <select formControlName="contaBancariaId"
                        class="field-input w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5">
                        <option [ngValue]="null">-- Nenhuma --</option>
                        <option *ngFor="let conta of contasBancarias" [value]="conta.id">{{ conta.nome }}</option>
                    </select>
                </div>

                <div class="md:col-span-2 lg:col-span-3 mt-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Informações Complementares
                        Fixas</label>
                    <textarea formControlName="infoComplementarPadrao"
                        class="field-input w-full min-h-[100px] bg-slate-50 border-slate-200 rounded-xl p-4 resize-y"
                        placeholder="Ex: Empresa enquadrada no Simples Nacional."></textarea>
                </div>
            </div>
        </div>

        <!-- Automação de E-mail -->
        <div class="card bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden mb-8"
            [class.opacity-50]="!configForm.get('ativarNfe')?.value">
            <div class="px-8 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 class="text-sm font-black text-slate-700 flex items-center gap-2 uppercase tracking-widest">
                    <i class="pi pi-envelope text-indigo-500"></i>
                    Automação de E-mail
                </h2>

                <!-- Toggle Enviar Email -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Envio Automático</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" formControlName="enviarEmail" class="sr-only peer">
                        <div
                            class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500">
                        </div>
                    </label>
                </div>
            </div>

            <div class="p-8 space-y-6" *ngIf="configForm.get('enviarEmail')?.value">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Assunto do E-mail</label>
                    <input type="text" formControlName="assuntoEmail"
                        class="field-input w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-2.5 font-semibold"
                        placeholder="Ex: Sua Nota Fiscal de Mercadoria">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Mensagem do E-mail</label>
                    <textarea formControlName="mensagemEmail"
                        class="field-input w-full min-h-[120px] bg-slate-50 border-slate-200 rounded-xl p-4 resize-y italic"
                        placeholder="Prezado cliente, sua nota fiscal foi emitida..."></textarea>
                </div>
            </div>
        </div>

    </form>

    <!-- Skeleton Loader (Fallback visual enquanto carrega na primeira vez) -->
    <div *ngIf="isLoading" class="space-y-6 animate-pulse mt-6">
        <div class="h-64 bg-slate-200 rounded-2xl w-full"></div>
        <div class="h-64 bg-slate-200 rounded-2xl w-full"></div>
    </div>
</div>
