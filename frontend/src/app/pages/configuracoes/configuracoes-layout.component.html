<div class="h-full flex flex-col font-sans bg-slate-50 min-h-screen">
    <!-- Header Minimalista da Central -->
    <header class="bg-white border-b border-slate-200 shadow-sm z-20 flex-shrink-0">
        <div class="max-w-[1400px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center">
                    <mat-icon class="!w-6 !h-6 !text-[24px]">settings_suggest</mat-icon>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800 leading-tight">Configurações Base</h1>
                    <p class="text-xs text-slate-500 font-medium">Gestão global do comportamento do sistema</p>
                </div>
            </div>
            <div>
                <button [routerLink]="['/dashboard']"
                    class="text-slate-500 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-1.5">
                    <mat-icon class="!w-4 !h-4 !text-[16px]">close</mat-icon> Fechar Painel
                </button>
            </div>
        </div>
    </header>

    <!-- Body layout (Sidebar + Content) -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Sidebar de Navegação de Configurações -->
        <aside class="w-64 bg-white border-r border-slate-200 flex-shrink-0 overflow-y-auto custom-scrollbar">
            <nav class="p-4 flex flex-col gap-1">
                <h3 class="px-3 text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-2 mt-2">Módulos
                    Globais</h3>

                <a *ngFor="let item of menuItems" [routerLink]="item.route"
                    class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] text-slate-600 font-medium hover:bg-slate-50 hover:text-indigo-600 transition-colors border border-transparent"
                    [class.active]="isRouteActive(item.route)">
                    <mat-icon class="!w-[18px] !h-[18px] !text-[18px] opacity-70">{{ item.icon }}</mat-icon>
                    {{ item.label }}
                </a>
            </nav>
        </aside>

        <!-- Área de Conteúdo da Rota Child -->
        <main class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8 relative w-full max-w-[1000px] mx-auto">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
