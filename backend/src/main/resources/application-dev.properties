# H2 - banco em memória para desenvolvimento
# NON_KEYWORDS=VALUE evita conflito com palavras reservadas do H2
spring.datasource.h2.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.username=sa
spring.datasource.h2.password=

# Console H2 (acessível em: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQLite (apenas para dados auxiliares — perfil dev usa SQLite local)
spring.datasource.sqlite.url=jdbc:sqlite:/home/marlon/Documentos/curso_spring/capitalerp/data/padrao.sqlite
spring.datasource.sqlite.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Naming strategy global: converte camelCase → snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# SQL Init
spring.sql.init.mode=always

# Flyway desabilitado (tabelas criadas pelo Hibernate + import.sql)
spring.flyway.enabled=false

# ACBr Microserviço NFS-e (http://localhost:8050 padrão)
acbr.nfse.url=http://localhost:8050
